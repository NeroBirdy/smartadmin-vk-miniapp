# .github/workflows/deploy.yml
name: Deploy Nuxt 4 site to Pages

on:
  # Запуск при пуше в основную ветку
  push:
    branches: ["main"]

  # Возможность ручного запуска
  workflow_dispatch:

# Права доступа для токена GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Ограничение конкурентных запусков
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job сборки
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Nuxt 4 требует Node.js 18+ или 20+
          cache: 'npm'       # Включаем кэширование node_modules через npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: nuxt

      - name: Install dependencies
        run: npm install     # Явная установка через npm install

      - name: Build static site (Nuxt Generate)
        run: npm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Путь вывода для Nuxt 3/4 при статической генерации
          path: ./.output/public

  # Job деплоя
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
